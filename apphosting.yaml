
# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 1024
  concurrency: 80

# Forçando o uso do Node.js 22 no ambiente de execução
env:
  - variable: NODE_VERSION
    value: "22"
